<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabMind</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="popup-body">
  <header class="app-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
      <div>
        <h1 data-i18n="appTitle">TabMind</h1>
        <p data-i18n="appSubtitle">Quiet tabs. Clear mind.</p>
      </div>
      <button type="button" id="open-options" class="btn btn--ghost btn--icon" title="Settings" aria-label="Settings">⚙</button>
    </div>
  </header>

  <section class="toolbar" id="focus-bar" aria-live="polite"></section>

  <div class="search-bar">
    <input
      type="search"
      id="smart-search"
      class="search-input"
      data-i18n-placeholder="searchPlaceholder"
      placeholder="Search open & snoozed tabs…"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <main class="scroll-main">
    <p id="search-empty" class="search-empty hidden" data-i18n="searchNoResults">No matching tabs</p>
    <div id="categories-container" class="category-grid" aria-live="polite"></div>
  </main>

  <script src="shared.js"></script>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
