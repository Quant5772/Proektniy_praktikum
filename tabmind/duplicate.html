<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabMind</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .duplicate-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: var(--bg);
    }

    .duplicate-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .duplicate-card__brand {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .duplicate-card__message {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .duplicate-card__url {
      margin: 0 0 24px;
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
      line-height: 1.45;
    }

    .duplicate-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .duplicate-actions .btn {
      width: 100%;
      padding: 12px 16px;
      font-size: 13px;
    }

    .duplicate-actions .btn--primary {
      font-weight: 600;
    }
  </style>
</head>
<body class="duplicate-page">
  <main class="duplicate-card">
    <p class="duplicate-card__brand" data-i18n="duplicateTitle">TabMind</p>
    <h1 class="duplicate-card__message" data-i18n="duplicateMessage">This page is already open.</h1>
    <p id="target-url" class="duplicate-card__url" hidden></p>

    <div class="duplicate-actions">
      <button type="button" id="btn-switch" class="btn btn--primary" data-i18n="duplicateSwitch">
        Switch to existing tab
      </button>
      <button type="button" id="btn-anyway" class="btn" data-i18n="duplicateOpenAnyway">
        Open duplicate anyway
      </button>
    </div>
  </main>

  <script src="i18n.js"></script>
  <script src="duplicate.js"></script>
</body>
</html>
